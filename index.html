<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#e65100"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Vratha Tracker"/>
  <meta name="description" content="48-Day Ganapati Vratha Tracker — chant 21 times daily, visit temple, track your sacred penance."/>
  <title>🕉 Ganapati Vratha Tracker — 48 Days</title>

  <!-- PWA manifest inline -->
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Ganapati%20Vratha%22%2C%22short_name%22%3A%22Vratha%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23fdf6ec%22%2C%22theme_color%22%3A%22%23e65100%22%7D"/>

  <style>
    :root {
      --saffron:   #e65100;
      --saffron-l: #ff8f00;
      --saffron-d: #bf360c;
      --bg:        #fdf6ec;
      --card:      #ffffff;
      --gold:      #ffcc80;
      --gold-l:    #fff8f0;
      --text:      #3b1f00;
      --muted:     #8d5524;
      --green:     #e8f5e9;
      --green-b:   #81c784;
      --radius:    12px;
      --shadow:    0 2px 12px rgba(0,0,0,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 0;
      min-height: 100vh;
    }

    /* ── STICKY HEADER ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, var(--saffron-l), var(--saffron));
      color: white;
      padding: 12px 16px 10px;
      box-shadow: 0 2px 10px rgba(230,81,0,.45);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .header-title { display: flex; align-items: center; gap: 8px; }
    .header-title .om { font-size: 1.6rem; line-height: 1; }
    .header-title h1 { font-size: 1rem; font-weight: 700; letter-spacing: .5px; }
    .header-title p  { font-size: 0.68rem; opacity: .9; }

    .header-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .hbtn {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: white; border-radius: 20px;
      padding: 5px 10px; font-size: 0.72rem; cursor: pointer;
      white-space: nowrap; transition: background .2s;
    }
    .hbtn:hover { background: rgba(255,255,255,.35); }

    /* progress strip */
    .progress-strip { margin-top: 8px; }
    .progress-bar-bg {
      background: rgba(255,255,255,.3);
      border-radius: 20px; height: 8px; overflow: hidden;
    }
    .progress-bar-fg {
      height: 8px;
      background: white;
      border-radius: 20px;
      transition: width .5s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 0.68rem; opacity: .9; margin-top: 3px; text-align: center;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 12px 0;
    }
    .stat-box {
      background: var(--card);
      border: 1.5px solid var(--gold);
      border-radius: var(--radius);
      padding: 8px 4px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-box .num {
      font-size: 1.4rem; font-weight: 800; color: var(--saffron);
      line-height: 1.1;
    }
    .stat-box .lbl { font-size: 0.6rem; color: var(--muted); margin-top: 2px; }

    /* ── START DATE ── */
    .start-date-row {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 10px 12px 4px;
      font-size: 0.8rem; color: var(--muted);
    }
    .start-date-row input[type=date] {
      border: 1.5px solid var(--gold);
      border-radius: 8px; padding: 5px 8px;
      font-size: 0.8rem; background: var(--gold-l);
      color: var(--text); cursor: pointer;
    }
    .start-date-row button {
      background: var(--saffron); color: white;
      border: none; border-radius: 8px;
      padding: 5px 12px; font-size: 0.75rem; cursor: pointer;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 12px;
      padding: 8px 12px; font-size: 0.72rem; color: var(--muted);
    }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .leg-dot {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid var(--saffron); background: white; flex-shrink: 0;
    }
    .leg-dot.on { background: var(--saffron); }

    /* ── DAY CARDS ── */
    .cards-container {
      padding: 8px 10px 80px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .day-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--gold);
      overflow: hidden;
      transition: border-color .2s;
    }
    .day-card.completed {
      border-color: var(--green-b);
      background: var(--green);
    }

    .card-header {
      display: flex; align-items: center;
      padding: 8px 12px;
      background: var(--gold-l);
      border-bottom: 1px solid var(--gold);
      gap: 10px;
    }
    .day-card.completed .card-header {
      background: #f1f8e9;
      border-bottom-color: var(--green-b);
    }

    .day-badge {
      background: var(--saffron); color: white;
      font-weight: 800; font-size: 0.85rem;
      min-width: 36px; height: 36px;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .day-card.completed .day-badge { background: var(--green-b); }

    .card-header-info { flex: 1; min-width: 0; }
    .card-header-info .day-line {
      font-weight: 700; font-size: 0.82rem; color: var(--saffron-d);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-header-info .day-line .day-date-txt {
      font-weight: 400; font-size: 0.75rem; color: var(--muted);
      margin-left: 5px;
    }
    .day-card.completed .card-header-info .day-line { color: #2e7d32; }
    .day-card.completed .card-header-info .day-date-txt { color: #4caf50; }

    .card-count-badge {
      flex-shrink: 0;
      font-size: 0.72rem; font-weight: 700;
      color: var(--saffron-d);
      background: white;
      border: 1.5px solid var(--gold);
      border-radius: 20px;
      padding: 3px 8px;
      min-width: 46px; text-align: center;
    }
    .day-card.completed .card-count-badge {
      color: #2e7d32; border-color: var(--green-b);
    }

    /* ── TEMPLE TOGGLE BUTTON ── */
    .temple-btn {
      flex-shrink: 0;
      padding: 7px 13px;
      border-radius: 20px;
      border: 2px solid var(--saffron);
      background: white;
      color: var(--saffron);
      font-size: 0.8rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: all .18s;
      -webkit-tap-highlight-color: transparent;
      min-height: 38px;
      user-select: none;
    }
    .temple-btn:active { transform: scale(.93); }
    .temple-btn.done {
      background: var(--saffron);
      color: white;
      border-color: var(--saffron-d);
    }
    .day-card.completed .temple-btn {
      background: #388e3c; border-color: #2e7d32; color: white;
    }
    .day-card.future .temple-btn {
      pointer-events: none; opacity: .38; cursor: default;
    }

    /* 21 marks grid */
    .marks-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      padding: 10px 12px;
    }

    .mark {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid var(--saffron);
      background: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: transparent;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      min-height: 36px;
    }
    .mark:active { transform: scale(.88); }
    .mark.done {
      background: var(--saffron);
      border-color: var(--saffron-d);
      color: white;
    }
    .mark.done::after { content: '✓'; font-weight: 700; }

    /* group separator every 7 */
    .marks-grid .mark:nth-child(7n) { }

    /* ── COMPLETE DAY BUTTON ── */
    .complete-day-btn {
      display: block; width: calc(100% - 24px);
      margin: 0 12px 10px;
      padding: 11px 8px;
      background: linear-gradient(135deg, var(--saffron-l), var(--saffron));
      color: white;
      border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; letter-spacing: .4px;
      box-shadow: 0 2px 8px rgba(230,81,0,.35);
      transition: all .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .complete-day-btn:active { opacity: .8; transform: scale(.97); }
    .day-card.completed .complete-day-btn {
      background: linear-gradient(135deg, #81c784, #388e3c);
      box-shadow: 0 2px 8px rgba(56,142,60,.3);
      pointer-events: none;
    }

    /* ── FUTURE DAY (locked) ── */
    .day-card.future { opacity: .55; }
    .day-card.future .marks-grid { pointer-events: none; }
    .day-card.future .complete-day-btn {
      background: #bdbdbd;
      box-shadow: none;
      pointer-events: none;
      letter-spacing: .3px;
    }

    /* ── BOTTOM TOOLBAR ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 1px solid var(--gold);
      display: flex; gap: 8px;
      padding: 8px 12px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 10px rgba(0,0,0,.08);
      z-index: 99;
    }
    .bottom-bar button {
      flex: 1; padding: 10px 6px;
      border-radius: 10px; border: none;
      font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .btn-export { background: #fff3e0; color: var(--saffron); border: 1.5px solid var(--gold); }
    .btn-import { background: #e8f5e9; color: #2e7d32; border: 1.5px solid var(--green-b); }
    .btn-reset  { background: #fce4ec; color: #c62828; border: 1.5px solid #ef9a9a; }
    .btn-guide  { background: var(--saffron); color: white; }

    .btn-export:active, .btn-import:active, .btn-reset:active, .btn-guide:active {
      opacity: .75; transform: scale(.97);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 200;
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px;
      max-width: 480px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,.25);
    }
    .modal h2 {
      font-size: 1rem; color: var(--saffron-d);
      margin-bottom: 12px; border-bottom: 2px solid var(--gold);
      padding-bottom: 8px;
    }
    .modal p, .modal li { font-size: 0.82rem; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
    .modal ol, .modal ul { padding-left: 18px; }
    .modal li { margin-bottom: 6px; }
    .modal code {
      background: #f5f5f5; border-radius: 4px;
      padding: 2px 6px; font-size: 0.78rem;
      font-family: monospace; color: #c62828;
      word-break: break-all;
    }
    .modal .close-btn {
      display: block; width: 100%; margin-top: 16px;
      padding: 10px; background: var(--saffron); color: white;
      border: none; border-radius: 10px; font-size: 0.85rem;
      cursor: pointer; font-weight: 600;
    }
    .modal section { margin-bottom: 14px; }
    .modal section h3 {
      font-size: 0.85rem; color: var(--saffron);
      margin-bottom: 6px; font-weight: 700;
    }
    .modal textarea {
      width: 100%; min-height: 90px;
      border: 1.5px solid var(--gold); border-radius: 8px;
      padding: 8px; font-size: 0.75rem;
      font-family: monospace; resize: vertical;
      background: #fffde7;
    }
    .modal .row-btns { display: flex; gap: 8px; margin-top: 8px; }
    .modal .row-btns button {
      flex: 1; padding: 8px;
      border-radius: 8px; border: none;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }
    .modal .row-btns .copy-btn { background: #e3f2fd; color: #1565c0; }
    .modal .row-btns .import-btn { background: var(--green); color: #2e7d32; }

    .step-num {
      display: inline-block; width: 20px; height: 20px;
      background: var(--saffron); color: white;
      border-radius: 50%; text-align: center; line-height: 20px;
      font-size: 0.72rem; font-weight: 700; margin-right: 4px;
      flex-shrink: 0;
    }
    .step { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 8px; }
    .step-body { font-size: 0.8rem; line-height: 1.5; }

    /* ── DESKTOP OVERRIDES (≥ 700px) ── */
    @media (min-width: 700px) {
      .cards-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        padding: 12px 16px 80px;
      }
      .marks-grid { grid-template-columns: repeat(7, 1fr); }
      .stats-row { padding: 14px 16px 0; gap: 12px; }
      .stat-box .num { font-size: 1.7rem; }
    }

    @media (min-width: 1100px) {
      .cards-container { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── QUICK LINKS ── */
    .quick-links {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 8px 12px 4px;
      justify-content: center;
    }
    .qbtn {
      background: rgba(230,81,0,.1);
      border: 1.5px solid var(--saffron);
      color: var(--saffron);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .qbtn:hover { background: rgba(230,81,0,.2); }
    .qbtn.active { background: var(--saffron); color: white; }

    .manthram-image-panel {
      display: none; padding: 0 12px 8px;
    }
    .manthram-image-panel.open { display: block; }
    .manthram-image-panel img {
      width: 100%; border-radius: 10px;
      border: 2px solid var(--gold);
      box-shadow: var(--shadow);
    }

    .audio-panel {
      display: none;
      padding: 8px 12px;
      background: #fff8f0;
      border-top: 1px solid var(--gold);
      border-bottom: 1px solid var(--gold);
    }
    .audio-panel.open { display: block; }
    .audio-panel audio { width: 100%; }
    .audio-count {
      text-align: center; font-size: 0.78rem;
      color: var(--muted); margin-top: 5px; font-weight: 600;
    }
    .audio-reset-btn {
      display: block; width: 100%; margin-top: 6px;
      padding: 7px; background: var(--saffron); color: white;
      border: none; border-radius: 8px; font-size: 0.75rem;
      font-weight: 600; cursor: pointer;
    }

    /* ── PRINT ── */
    @media print {
      .site-header, .bottom-bar, .modal-overlay { display: none !important; }
      .cards-container { padding-bottom: 0; display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
      .day-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
      body { background: white; }
    }
  </style>
</head>
<body>

<!-- ── STICKY HEADER ── -->
<header class="site-header">
  <div class="header-top">
    <div class="header-title">
      <span class="om">🕉</span>
      <div>
        <h1>Ganapati Vratha Tracker</h1>
        <p>48-Day Sacred Penance · 21 Chantings Daily</p>
      </div>
    </div>
    <div class="header-actions"></div>
  </div>
  <div class="progress-strip">
    <div class="progress-bar-bg">
      <div class="progress-bar-fg" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">0 of 48 days complete 🙏</div>
  </div>
</header>

<!-- ── STATS ── -->
<div class="stats-row">
  <div class="stat-box"><div class="num" id="sDays">0</div><div class="lbl">Days Done</div></div>
  <div class="stat-box"><div class="num" id="sTemple">0</div><div class="lbl">Temple Visits</div></div>
  <div class="stat-box"><div class="num" id="sChants">0</div><div class="lbl">Chantings</div></div>
  <div class="stat-box"><div class="num" id="sLeft">48</div><div class="lbl">Remaining</div></div>
</div>

<!-- ── START DATE ── -->
<div class="start-date-row" id="startDateRow">
  <label for="startDate">Vratha Start Date:</label>
  <input type="date" id="startDate"/>
  <button onclick="applyStartDate()">Auto-fill dates</button>
</div>

<!-- ── LEGEND ── -->
<div class="legend">
  <span><span class="leg-dot"></span> Pending chant</span>
  <span><span class="leg-dot on"></span> Done chant</span>
  <span>☐ Temple visit</span>
  <span>🟩 Full day complete</span>
</div>

<!-- ── QUICK LINKS ── -->
<div class="quick-links">
  <button class="qbtn" id="qImgBtn" onclick="toggleManthramImage()">📜 Manthram (Telugu)</button>
  <button class="qbtn" id="qAudioBtn" onclick="toggleAudioPanel()">🔊 Play Manthram (21×)</button>
</div>

<div class="manthram-image-panel" id="manthramImagePanel">
  <img src="Manthram.png" alt="Manthram in Telugu"/>
</div>

<div class="audio-panel" id="audioPanel">
  <audio id="manthramAudio" src="Manthram.mpeg" controls preload="auto"></audio>
  <div class="audio-count" id="audioCount">Chanting: 0 / 21</div>
  <button class="audio-reset-btn" onclick="resetAudio()">↺ Reset count</button>
</div>

<!-- ── CARDS ── -->
<div class="cards-container" id="cardsContainer"></div>



<script>
// ── CONSTANTS ──
const DAYS       = 48;
const CHANTS     = 21;
const LS_KEY     = 'ganapatiVratha_v2';
const COOKIE_KEY = 'gvt2';

// ── STORAGE: localStorage (primary) + cookie (backup) ──
function saveState(st) {
  const json = JSON.stringify(st);
  try { localStorage.setItem(LS_KEY, json); } catch(e) {}
  // compact cookie backup (expires 200 days)
  try {
    const d = new Date(); d.setDate(d.getDate() + 200);
    document.cookie = COOKIE_KEY + '=' + encodeURIComponent(json)
      + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
  } catch(e) {}
}

function loadState() {
  // 1. try localStorage
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // 2. fallback: cookie
  try {
    const m = document.cookie.match('(?:^|; )' + COOKIE_KEY + '=([^;]*)');
    if (m) return JSON.parse(decodeURIComponent(m[1]));
  } catch(e) {}
  return {};
}

let state = loadState();

function ensureDay(d) {
  const k = 'd' + d;
  if (!state[k]) state[k] = { marks: new Array(CHANTS).fill(false), temple: false, date: '' };
}

// ── BUILD CARDS ──
function buildCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  for (let d = 1; d <= DAYS; d++) {
    ensureDay(d);
    container.appendChild(makeCard(d));
  }
  updateStats();
}

function makeCard(d) {
  const k = 'd' + d;
  const s = state[k];
  const count = s.marks.filter(Boolean).length;
  const done  = count === CHANTS && s.temple;

  const future = isFuture(d);
  const card = document.createElement('div');
  card.className = 'day-card' + (done ? ' completed' : '') + (future ? ' future' : '');
  card.id = 'card' + d;

  // ── card header ──
  const hdr = document.createElement('div');
  hdr.className = 'card-header';

  const badge = document.createElement('div');
  badge.className = 'day-badge';
  badge.textContent = d;

  const countBadge = document.createElement('div');
  countBadge.className = 'card-count-badge';
  countBadge.id = 'count' + d;
  countBadge.textContent = count + '/21';

  const info = document.createElement('div');
  info.className = 'card-header-info';
  const dayLine = document.createElement('div');
  dayLine.className = 'day-line';
  dayLine.textContent = 'Day ' + d;
  const dateTxt = document.createElement('span');
  dateTxt.className = 'day-date-txt';
  dateTxt.id = 'datetxt' + d;
  dateTxt.textContent = s.date ? fmtDate(s.date) : '';
  dayLine.appendChild(dateTxt);
  info.appendChild(dayLine);

  const templeBtn = document.createElement('button');
  templeBtn.className = 'temple-btn' + (s.temple ? ' done' : '');
  templeBtn.id = 'templebtn' + d;
  templeBtn.textContent = s.temple ? '🛕 Visited' : '🛕 Temple';
  templeBtn.addEventListener('click', () => {
    if (isFuture(d)) return;
    state[k].temple = !state[k].temple;
    saveState(state);
    refreshCard(d);
    updateStats();
  });

  hdr.appendChild(badge);
  hdr.appendChild(countBadge);
  hdr.appendChild(info);
  hdr.appendChild(templeBtn);
  card.appendChild(hdr);

  // ── complete-day button ──
  const completeBtn = document.createElement('button');
  completeBtn.className = 'complete-day-btn';
  completeBtn.id = 'completebtn' + d;
  completeBtn.textContent = done ? '✓ Day Complete' : future ? '🔒 Future Day' : '🙏 Complete Day (21 chants + Temple)';
  completeBtn.addEventListener('click', () => completeDay(d));
  card.appendChild(completeBtn);

  // ── marks grid ──
  const grid = document.createElement('div');
  grid.className = 'marks-grid';
  grid.id = 'grid' + d;

  for (let m = 0; m < CHANTS; m++) {
    const mk = document.createElement('div');
    mk.className = 'mark' + (s.marks[m] ? ' done' : '');
    mk.title = 'Chanting ' + (m + 1);
    mk.addEventListener('click', () => toggleMark(d, m));
    // touch friendly
    mk.addEventListener('touchend', e => { e.preventDefault(); toggleMark(d, m); });
    grid.appendChild(mk);
  }
  card.appendChild(grid);
  return card;
}

// ── DATE HELPERS ──
function fmtDate(iso) {
  if (!iso) return '';
  const [, m, dd] = iso.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dd + ' ' + months[m - 1];
}

function todayISO() {
  const t = new Date();
  return t.getFullYear() + '-'
    + String(t.getMonth() + 1).padStart(2, '0') + '-'
    + String(t.getDate()).padStart(2, '0');
}

function isFuture(d) {
  const s = state['d' + d];
  if (!s || !s.date) return false; // no date assigned → allow
  return s.date > todayISO();
}

function completeDay(d) {
  if (isFuture(d)) return;
  const k = 'd' + d;
  ensureDay(d);
  state[k].marks = new Array(CHANTS).fill(true);
  state[k].temple = true;
  saveState(state);
  refreshCard(d);
  updateStats();
}

function toggleMark(d, m) {
  if (isFuture(d)) return;
  const k = 'd' + d;
  state[k].marks[m] = !state[k].marks[m];
  saveState(state);
  refreshCard(d);
  updateStats();
}

function refreshCard(d) {
  const k = 'd' + d;
  const s = state[k];
  const grid = document.getElementById('grid' + d);
  const card = document.getElementById('card' + d);
  const countEl = document.getElementById('count' + d);
  if (!grid || !card) return;

  const marks = grid.querySelectorAll('.mark');
  let count = 0;
  marks.forEach((el, i) => {
    if (s.marks[i]) { el.classList.add('done'); count++; }
    else el.classList.remove('done');
  });
  countEl.textContent = count + '/21';

  const done = count === CHANTS && s.temple;
  if (done) card.classList.add('completed');
  else card.classList.remove('completed');

  // update future lock
  const future = isFuture(d);
  if (future) card.classList.add('future');
  else card.classList.remove('future');

  // update complete-day button
  const cbtn = document.getElementById('completebtn' + d);
  if (cbtn) cbtn.textContent = done ? '✓ Day Complete' : future ? '🔒 Future Day' : '🙏 Complete Day (21 chants + Temple)';

  // update temple button
  const tbtn = document.getElementById('templebtn' + d);
  if (tbtn) {
    tbtn.textContent = s.temple ? '🛕 Visited' : '🛕 Temple';
    if (s.temple) tbtn.classList.add('done');
    else tbtn.classList.remove('done');
  }

  // update date text
  const dtxt = document.getElementById('datetxt' + d);
  if (dtxt) dtxt.textContent = s.date ? fmtDate(s.date) : '';
}

// ── STATS ──
function updateStats() {
  let doneD = 0, templeV = 0, totalC = 0;
  for (let d = 1; d <= DAYS; d++) {
    const k = 'd' + d; ensureDay(d);
    const c = state[k].marks.filter(Boolean).length;
    totalC += c;
    if (state[k].temple) templeV++;
    if (c === CHANTS && state[k].temple) doneD++;
  }
  document.getElementById('sDays').textContent   = doneD;
  document.getElementById('sTemple').textContent = templeV;
  document.getElementById('sChants').textContent = totalC;
  document.getElementById('sLeft').textContent   = DAYS - doneD;

  const pct = Math.round((doneD / DAYS) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    doneD + ' of 48 days complete (' + pct + '%) 🙏';
}

// ── START DATE AUTO-FILL ──
function applyStartDate() {
  const inp = document.getElementById('startDate');
  if (!inp.value) { alert('Please pick a start date first.'); return; }
  // Parse as local date (avoid UTC offset shifting the day)
  const [y, mo, dy] = inp.value.split('-').map(Number);
  const start = new Date(y, mo - 1, dy);
  for (let d = 1; d <= DAYS; d++) {
    ensureDay(d);
    const dt = new Date(start);
    dt.setDate(start.getDate() + d - 1);
    const yy  = dt.getFullYear();
    const mm  = String(dt.getMonth() + 1).padStart(2, '0');
    const dd  = String(dt.getDate()).padStart(2, '0');
    state['d' + d].date = yy + '-' + mm + '-' + dd;
  }
  state.datesFixed = true;
  saveState(state);

  // Rebuild cards (so date text + future locks update)
  buildCards();

  // Hide the schedule row permanently
  const row = document.getElementById('startDateRow');
  if (row) row.style.display = 'none';

  scrollToToday();
}

function scrollToToday() {
  const iso = todayISO();
  for (let d = 1; d <= DAYS; d++) {
    if (state['d' + d] && state['d' + d].date === iso) {
      const card = document.getElementById('card' + d);
      if (card) setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
      break;
    }
  }
}


// ── QUICK LINKS ──
let audioLoopCount = 0;

function toggleManthramImage() {
  document.getElementById('manthramImagePanel').classList.toggle('open');
  document.getElementById('qImgBtn').classList.toggle('active');
}

function toggleAudioPanel() {
  const panel = document.getElementById('audioPanel');
  panel.classList.toggle('open');
  document.getElementById('qAudioBtn').classList.toggle('active');
  if (panel.classList.contains('open')) {
    audioLoopCount = 0;
    document.getElementById('audioCount').textContent = 'Chanting: 0 / 21';
  }
}

function resetAudio() {
  const audio = document.getElementById('manthramAudio');
  audio.pause();
  audio.currentTime = 0;
  audioLoopCount = 0;
  document.getElementById('audioCount').textContent = 'Chanting: 0 / 21';
}

(function initAudio() {
  const audio = document.getElementById('manthramAudio');
  audio.addEventListener('ended', function() {
    audioLoopCount++;
    if (audioLoopCount < 21) {
      document.getElementById('audioCount').textContent = 'Chanting: ' + audioLoopCount + ' / 21';
      audio.currentTime = 0;
      audio.play();
    } else {
      document.getElementById('audioCount').textContent = '✓ Completed 21 chantings 🙏';
      audioLoopCount = 0;
    }
  });
  audio.addEventListener('play', function() {
    if (audioLoopCount === 0) {
      document.getElementById('audioCount').textContent = 'Chanting: 0 / 21';
    }
  });
})();

// ── RESET ──
function resetAll() {
  if (confirm('Reset ALL progress? Export first if you want a backup!')) {
    state = {};
    saveState(state);
    buildCards();
  }
}

// ── INIT ──
buildCards();

if (state.datesFixed) {
  // Dates confirmed — hide the schedule row and jump to today
  const row = document.getElementById('startDateRow');
  if (row) row.style.display = 'none';
  scrollToToday();
} else {
  // Restore start date field from saved Day-1 date
  try {
    const d1 = state['d1'];
    if (d1 && d1.date) {
      if (/^\d{4}-\d{2}-\d{2}$/.test(d1.date)) {
        document.getElementById('startDate').value = d1.date;
      } else {
        const parts = d1.date.split('/');
        if (parts.length === 3) {
          document.getElementById('startDate').value =
            parts[2] + '-' + parts[1] + '-' + parts[0];
        }
      }
    }
  } catch(e) {}
}
</script>
